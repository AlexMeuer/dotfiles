# ── Prefix ────────────────────────────────────────────────────────────
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix
set -g prefix2 C-b
bind C-b send-prefix -2

# ── General ───────────────────────────────────────────────────────────
set -g escape-time 0
set -g mouse on
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g focus-events on

# ── True color support ────────────────────────────────────────────────
set -g default-terminal "tmux-256color"
set -sa terminal-overrides ",xterm-256color:RGB"

# ── Extended keys (pass Shift+Enter, Ctrl+Enter, etc. to apps) ──────
set -s extended-keys on
set -as terminal-features 'xterm*:extkeys'
set -g allow-passthrough on

# ── Window (tab) management ──────────────────────────────────────────
bind t new-window -c "#{pane_current_path}"
bind w confirm-before -p "kill window #W? (y/n)" kill-window
bind , command-prompt -I "#W" "rename-window '%%'"
bind ] next-window
bind [ previous-window

# Alt+1..9 — direct window switch (prefix-free)
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9

# ── Pane management ──────────────────────────────────────────────────
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind x confirm-before -p "kill pane? (y/n)" kill-pane
# prefix+z (zoom) is a tmux default — no rebind needed
bind Space next-layout

# Pane resizing with arrow keys
bind -r Up    resize-pane -U 5
bind -r Down  resize-pane -D 5
bind -r Left  resize-pane -L 5
bind -r Right resize-pane -R 5

# ── Copy mode ────────────────────────────────────────────────────────
bind Escape copy-mode
bind v paste-buffer

# ── Status bar — Gruvbox Material Dark ───────────────────────────────
set -g status-style "bg=#282828,fg=#a89984"
set -g status-left "#[fg=#282828,bg=#d4be98,bold] #S #[default] "
set -g status-right '#{?client_prefix,#[fg=#89b482 bold]#[nobold] ,}#(cd #{pane_current_path} && if git rev-parse --git-dir >/dev/null 2>&1; then if git diff --quiet 2>/dev/null && git diff --cached --quiet 2>/dev/null; then printf "#[fg=#a9b665]"; else printf "#[fg=#d8a657]"; fi; printf " "; git branch --show-current; fi) #[fg=#a89984]#h '
set -g status-left-length 40
set -g status-right-length 60

setw -g window-status-format " #[fg=#a89984]#I:#[fg=#a89984]#W "
setw -g window-status-current-format " #[fg=#665c54]#I:#[fg=#d4be98,bold]#W#[nobold] "
setw -g window-status-separator ""

set -g pane-border-style "fg=#504945"
set -g pane-active-border-style "fg=#a9b665"
set -g message-style "bg=#282828,fg=#d4be98"

# ── Plugins (via TPM) ───────────────────────────────────────────────
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-yank'

# Initialize TPM (keep this at the very bottom)
run '~/.config/tmux/plugins/tpm/tpm'
